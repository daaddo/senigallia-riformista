<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Ripristina il percorso reale dal redirect di 404.html.
      (function (l) {
        if (l.search[1] === '/') {
          var parts = l.search.slice(1).split('&');
          var path = parts[0].replace(/~and~/g, '&');
          var query = parts[1] ? '&' + parts[1].slice(1).replace(/~and~/g, '&') : '';
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + path + query + l.hash
          );
        }
      })(window.location);
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Progetto Senigallia Riformista - Lista dei candidati alle elezioni amministrative 2026."
    />
    <title>Progetto Senigallia Riformista - Candidati</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
